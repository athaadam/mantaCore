<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MantaCore Profile</title>
  <link rel="stylesheet" href="asset/style/page.css" />
  <link rel="stylesheet" href="asset/style/profile.css" />
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <img src="asset/img/logo.png" alt="MantaCore" />
      </div>
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="sales.html">Sales Report</a></li>
        <li><a href="purchaseApproval.html">Purchase Approval</a></li>
        <li><a href="inventory.html">Inventory</a></li>
        <li><a href="accountManage.html">Account Management</a></li>
        <li class="active"><a href="profile.html">Profile</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <h1>User Profile</h1>
      <div class="profile-card">
        <div class="profile-header">
          <img src="asset/img/avatar-placeholder.png" alt="User Avatar" class="avatar" />
          <div class="user-info">
            <h2>Adam Alhashif</h2>
            <p>Administrator</p>
          </div>
          <button class="edit-button" onclick="toggleEditAccess()">Edit</button>
        </div>

        <div class="profile-details">
          <div class="detail-group">
            <label>Email</label>
            <p id="emailText">adam.alhashif@email.com</p>
          </div>
          <div class="detail-group">
            <label>Username</label>
            <p>adam123</p>
          </div>
          <div class="detail-group">
            <label>Phone</label>
            <p id="phoneText">+62 812-3456-7890</p>
          </div>
          <div class="detail-group">
            <label>Subscription Active Until</label>
            <p>December 31, 2025</p>
          </div>
          <div class="detail-group">
            <label>Joined Since</label>
            <p>January 10, 2024</p>
          </div>
        </div>

        <!-- FORM VERIFIKASI EDIT -->
        <form id="verifyEditForm" style="display: none; margin-top: 20px;">
          <div class="input-group">
            <label for="verifyPassword">Enter your current password to edit:</label>
            <input type="password" id="verifyPassword" placeholder="Current Password" required />
          </div>
          <button type="button" class="btn-secondary" onclick="unlockEditForm()">Continue</button>
        </form>

        <!-- FORM EDIT -->
        <form id="editForm" style="display: none; margin-top: 20px;">
          <div class="input-group">
            <label for="email">New Email</label>
            <input type="email" id="email" placeholder="Enter new email" />
          </div>
          <div class="input-group">
            <label for="phone">New Phone</label>
            <input type="text" id="phone" placeholder="Enter new phone" />
          </div>
          <button type="submit" class="btn-secondary">Save Changes</button>
        </form>

        <!-- GANTI PASSWORD -->
        <div class="profile-actions">
          <button class="btn-secondary" onclick="togglePasswordChange()">Change Password</button>
          <button class="btn-danger">Delete Account</button>
        </div>

        <!-- FORM CHANGE PASSWORD -->
        <form id="changePasswordForm" style="display: none; margin-top: 20px;">
          <div class="input-group">
            <label for="oldPassword">Current Password</label>
            <input type="password" id="oldPassword" placeholder="Enter current password" required />
          </div>
          <div class="input-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password" required />
          </div>
          <button type="submit" class="btn-secondary">Update Password</button>
        </form>

      </div>
    </div>
  </div>

  <script>
    function toggleEditAccess() {
      const verifyForm = document.getElementById("verifyEditForm");
      verifyForm.style.display = verifyForm.style.display === "none" ? "block" : "none";
    }

    function unlockEditForm() {
      const password = document.getElementById("verifyPassword").value;
      if (password === "adminpass") { // simulasi validasi, ganti dengan backend nantinya
        document.getElementById("editForm").style.display = "block";
        document.getElementById("verifyEditForm").style.display = "none";
      } else {
        alert("Incorrect password.");
      }
    }

    function togglePasswordChange() {
      const passForm = document.getElementById("changePasswordForm");
      passForm.style.display = passForm.style.display === "none" ? "block" : "none";
    }
  </script>
  <script>
  document.querySelectorAll('.sidebar ul li').forEach(function(li) {
    li.addEventListener('click', function(e) {
      const link = li.querySelector('a');
      if (link) {
        // Hindari double navigation jika klik langsung pada <a>
        if (e.target !== link) {
          window.location.href = link.getAttribute('href');
        }
      }
    });
  });
</script>
</body>
</html>
