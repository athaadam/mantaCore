<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MantaCore Auth</title>
  <link rel="stylesheet" href="asset/style/index.css" />
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <h1>Empowering Your<br>Business Workflow</h1>
      <div class="brand">
        <img src="asset/img/logo.png" alt="MantaCore Logo" />
      </div>
    </div>

    <div class="right-panel">
      <div class="form-wrapper" id="formWrapper">
        <!-- LOGIN FORM -->
        <div class="form-box" id="loginForm">
          <h2>Sign In</h2>
          <form>
            <input type="text" placeholder="Username" required />
            <input type="password" placeholder="Password" required />
            <button type="submit">Login</button>
          </form>
          <a href="#" class="forgot">Forgot password?</a>
          <p class="switch">Doesn’t have an account? <a href="#" id="showRegister">Create now</a></p>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-box" id="registerForm">
          <h2>Register</h2>
          <form>
            <input type="text" placeholder="Username" required />
            <input type="password" placeholder="Password" required />
            <input type="password" placeholder="Confirmation Password" required />
            <input type="email" placeholder="Email" required />
            <input type="text" placeholder="Company Name" />
            <button type="submit">Register</button>
          </form>
          <p class="switch">Already have an account? <a href="#" id="showLogin">Login here</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="asset/JS/index.js"></script>
</body>
</html>
